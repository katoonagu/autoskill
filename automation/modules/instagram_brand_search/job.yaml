job_name: instagram_brand_search

browser_profile:
  provider: adspower
  profile_no: "353"

state:
  state_file: automation/state/instagram_brand_search_state.json
  restore_last_context_on_startup: true
  resume_from_last_post: true
  persist_candidate_history: true

site:
  base_url: https://www.instagram.com/

inputs:
  blogger_list_file: inputs/instagram_brand_search/blogger_profiles.txt
  max_seed_targets: 20

outputs:
  candidate_screenshots_dir: output/instagram_brand_search/brands/screenshots
  extracted_candidates_md: output/instagram_brand_search/brands/brand_dossiers.md
  discovered_brand_links_md: output/instagram_brand_search/brands/brand_links.md
  blogger_summary_md: output/instagram_brand_search/brands/blogger_summary.md
  brands_by_blogger_dir: output/instagram_brand_search/brands/by_blogger
  following_candidates_dir: output/instagram_brand_search/following

scan_policy:
  include_posts: true
  include_reels: true
  include_comments: false
  search_for_at_mentions_only: true
  target_period_days: 365
  fallback_max_posts_per_blogger: 112
  max_candidates_per_post: 10

navigation_policy:
  open_candidate_in_new_tab: true
  checkpoint_using_permalink: true
  refind_post_after_return: true

humanization_policy:
  speed_profile: fast_human
  min_pause_ms: 60
  max_pause_ms: 450
  slower_on_sensitive_actions: true
  avoid_burst_navigation: true

classification_policy:
  accept_niches:
    - beauty
    - fashion
    - apps_services
    - fmcg_everyday
    - sports_wellness
    - jewelry_accessories
    - clinics_cosmetology_dentistry
    - travel_leisure
    - home_decor
  reject_non_brand_profiles: true

retry_policy:
  selector_timeout_sec: 20
  max_navigation_retries: 3

following_scan_policy:
  enabled: true
  follower_threshold: 300000
  reject_brand_like_profiles: true
  dialog_load_max_attempts: 6
  max_profiles_to_review: 0
  max_scroll_passes_without_new_handles: 6
