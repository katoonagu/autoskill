task_types:
  discovery.extract_brand_candidates:
    assigned_agent: discovery_agent
    description: Scan Instagram discovery inputs and materialize exportable brand candidates.
    requires_browser: true
    required_profile_capability: instagram_discovery
    requires_human_approval: false
    approval_scope: ""
    max_attempts: 1

  brand_intelligence.collect_evidence:
    assigned_agent: brand_intelligence_agent
    description: Collect web and discovery evidence for one discovered brand without making the final verdict.
    requires_browser: false
    required_profile_capability: ""
    requires_human_approval: false
    approval_scope: ""
    max_attempts: 3

  brand_arbiter.evaluate_case:
    assigned_agent: brand_arbiter_agent
    description: Evaluate one brand case from structured evidence and produce the main intelligence packet.
    requires_browser: false
    required_profile_capability: ""
    requires_human_approval: false
    approval_scope: ""
    max_attempts: 3

  media_intelligence.analyze_recent_media:
    assigned_agent: media_intelligence_agent
    description: Analyze recent brand-related media and comments when the arbiter requests deeper enrichment.
    requires_browser: false
    required_profile_capability: ""
    requires_human_approval: false
    approval_scope: ""
    max_attempts: 2

  outreach_planning.decide:
    assigned_agent: outreach_planning_agent
    description: Decide whether to contact a brand-blogger pair and create the outreach angle.
    requires_browser: false
    required_profile_capability: ""
    requires_human_approval: false
    approval_scope: ""
    max_attempts: 3

  conversation.prepare_draft:
    assigned_agent: conversation_agent
    description: Prepare a message draft for an approved campaign task.
    requires_browser: false
    required_profile_capability: ""
    requires_human_approval: true
    approval_scope: conversation.prepare_draft
    max_attempts: 3

  conversation.send_message:
    assigned_agent: conversation_agent
    description: Send an approved outbound message through a browser-bound channel.
    requires_browser: true
    required_profile_capability: outbound_conversation
    requires_human_approval: true
    approval_scope: conversation.send_message
    max_attempts: 2

  validation.review_brand_case:
    assigned_agent: feedback_validation_agent
    description: Review a high-risk, low-confidence, or incomplete brand case before outreach.
    requires_browser: false
    required_profile_capability: ""
    requires_human_approval: false
    approval_scope: ""
    max_attempts: 3

  validation.review_failed_task:
    assigned_agent: feedback_validation_agent
    description: Investigate a failed downstream task and produce a recommendation.
    requires_browser: false
    required_profile_capability: ""
    requires_human_approval: false
    approval_scope: ""
    max_attempts: 2
